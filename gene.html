<html>
<head>
    <title>Gene Results</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        li {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h1>Gene: {{ gene }}</h1>

<div class="box">
<ul>
{% for r in results %}
<li>
<b>{{ r.go_id }}</b> - {{ r.name }}<br>
Ancestors: {{ r.ancestors }}
</li>
{% endfor %}
</ul>
</div>

<br>
<a href="/">⬅ Back</a>

</body>
</html>
